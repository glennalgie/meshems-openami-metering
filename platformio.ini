; PlatformIO Project Configuration File
;
; Full flash (firmware + data/ SPIFFS, e.g. index.html):
;   pio run -t upload -t uploadfs
; Map: dashboard uses MapLibre + OpenFreeMap (no token). Legacy data/mapbox-config.js is unused unless you revert the HTML.
; Port: scripts/pick_serial_port.py skips Bluetooth. Or: pio device list
; zsh: bare globs error if nothing matches — use  pio device list  or  ls /dev/cu.*
;
; Editor "Arduino.h not found": firmware builds with `pio run`. For IntelliSense run
; `pio run -t compiledb` (see .clangd). VS Code + PlatformIO: "PlatformIO: Rebuild IntelliSense Index".
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[common]
lib_deps = ;https://github.com/vshymanskyy/TinyGSM.git
            ;mikalhart/TinyGPSPlus @ ^1.1.0
            ;robtillaart/UUID @ ^0.1.6
            WiFi
            WiFiServer
            plerup/EspSoftwareSerial @ ^8.2.0
            4-20ma/ModbusMaster @ 2.0.1
            paulstoffregen/Time @ ^1.6.1
            https://github.com/coryjfowler/MCP_CAN_lib.git
            ;adafruit/Adafruit NeoPixel @ ^1.12.3
            ;FASTLED
	        https://github.com/adafruit/Adafruit_BME280_Library.git
            ArduinoJson
            ;cmb27/ModbusRTUSlave @ ^2.0.6 moved to lib and modified
            PubSubClient
            ; ATM90E32: use patched copy in lib/ATM90E32 (upstream BeginInternal calls SPI.begin() and breaks shared-bus pin config).

build_flags =
    -D__AVR__
    -DUSE_SOFTWARE_SERIAL
    -DCONFIG_ETH_ENABLED
    -DENABLE_RGBWLED
    ; EMS PCB revision for include/pins.h (exactly one):
    -DBOARD_VER_V3
    ;-DBOARD_VER_V1
    ;-DBOARD_VER_V2
    ;-DBOARD_HAS_PSRAM       

    ; Enable UARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    ;-DARDUINO_USB_CDC_ON_BOOT=1
    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    -UARDUINO_USB_CDC_ON_BOOT

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
    ${common.lib_deps}
    esp32async/AsyncTCP @ ^3.4.4
    me-no-dev/ESPAsyncWebServer @ ^3.6.0
    ;https://github.com/me-no-dev/ESPAsyncWebServer.git
    ;https://github.com/me-no-dev/AsyncTCP.git
build_flags = ${common.build_flags}

board_build.partitions = huge_app.csv
upload_speed = 921600
board_build.filesystem = spiffs
lib_ldf_mode = deep
monitor_speed = 115200
; Avoid Bluetooth-Incoming-Port without hard-coding usbmodem (CH340/CP210x use other names).
extra_scripts = pre:scripts/pick_serial_port.py, pre:scripts/kmz_to_circuit_paths.py
; If upload still fails, plug the board and set an explicit port from `pio device list`:
; upload_port = /dev/cu.usbmodem1101
; monitor_port = /dev/cu.usbmodem1101
;
; Circuit1/2/3.kmz → include/circuit_paths_generated.h (pre: scripts/kmz_to_circuit_paths.py)

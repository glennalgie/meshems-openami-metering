; PlatformIO Project Configuration File
;
; Editor "Arduino.h not found": firmware builds with `pio run`. For IntelliSense run
; `pio run -t compiledb` (see .clangd). VS Code + PlatformIO: "PlatformIO: Rebuild IntelliSense Index".
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[common]
lib_deps = ;https://github.com/vshymanskyy/TinyGSM.git
            ;mikalhart/TinyGPSPlus @ ^1.1.0
            ;robtillaart/UUID @ ^0.1.6
            WiFi
            WiFiServer
            plerup/EspSoftwareSerial @ ^8.2.0
            4-20ma/ModbusMaster @ 2.0.1
            paulstoffregen/Time @ ^1.6.1
            https://github.com/coryjfowler/MCP_CAN_lib.git
            ;adafruit/Adafruit NeoPixel @ ^1.12.3
            fastled/FastLED @ 3.7.8
	        https://github.com/adafruit/Adafruit_BME280_Library.git
            ArduinoJson
            ;cmb27/ModbusRTUSlave @ ^2.0.6 moved to lib and modified
           	PubSubClient

build_flags =
    -DUSE_SOFTWARE_SERIAL
    -DCONFIG_ETH_ENABLED
    -DENABLE_RGBWLED

    ; EMS PCB revision for include/pins.h (exactly one):
    -DBOARD_VER_V3 ; Latest version of EMS, using NESL EMS PCBA v865B
    ;-DBOARD_VER_V1 ; legacy first version of EMS, handsoldered
    ;-DBOARD_VER_V2 ; legacy first version of EMS, modbus interface pins accidentally swapped 
    ;-DBOARD_HAS_PSRAM       

    ; Feature enable/disable flags (uncomment to enable):
    -DENABLE_OLED_DISPLAY       ; OLED SH1106 display
    -DENABLE_WIFI               ; WiFi connectivity
    -DENABLE_MQTT               ; MQTT client (requires WiFi)
    ;-DENABLE_CAN               ; CAN bus interface (MCP2515)
    -DENABLE_MODBUS_MASTER      ; Modbus master (RS485_1)
    ;-DENABLE_MODBUS_CLIENT     ; Modbus client/slave (RS485_2)
    ;-DENABLE_RELAYS            ; Relay control: onboard SSR + I2C 8-ch SSR bank
    -DENABLE_DEBUG              ; Debug logging

    ; Enable UARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    ;-DARDUINO_USB_CDC_ON_BOOT=1
    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    -UARDUINO_USB_CDC_ON_BOOT

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
    ${common.lib_deps}
    esp32async/AsyncTCP @ ^3.4.4
    me-no-dev/ESPAsyncWebServer @ ^3.6.0
    ;https://github.com/me-no-dev/ESPAsyncWebServer.git
    ;https://github.com/me-no-dev/AsyncTCP.git
build_flags = ${common.build_flags}

board_build.partitions = huge_app.csv
upload_speed = 921600
board_build.filesystem = spiffs
lib_ldf_mode = deep
monitor_speed = 115200

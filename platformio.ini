; PlatformIO Project Configuration File
;
; Editor "Arduino.h not found": firmware builds with `pio run`. For IntelliSense run
; `pio run -t compiledb` (see .clangd). VS Code + PlatformIO: "PlatformIO: Rebuild IntelliSense Index".
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[common]
lib_deps = ; Verify if the following libraries are actually needed and remove if not:
            ;mikalhart/TinyGPSPlus @ ^1.1.0
            ;robtillaart/UUID @ ^0.1.6
            ;adafruit/Adafruit NeoPixel @ ^1.12.3
            ;WiFiServer
            ;cmb27/ModbusRTUSlave @ ^2.0.6 moved to lib and modified
            ;https://github.com/vshymanskyy/TinyGSM.git
            
            ; Always required libraries (add any new shared dependencies here):
            WiFi
            plerup/EspSoftwareSerial @ ^8.2.0
            4-20ma/ModbusMaster @ 2.0.1
            paulstoffregen/Time @ ^1.6.1
            ;fastled/FastLED @ 3.7.8                         ; RGBW LED helper; disabled by default to avoid ESP32-S3 RMT legacy/driver_ng conflicts.
	        https://github.com/adafruit/Adafruit_BME280_Library.git
            ArduinoJson
           	PubSubClient
            
            ; Add conditional libraries here (uncomment as needed):
            circuitsetup/ATM90E32                               ;ATM90E32 SPI energy meter library — required when METER_TYPE_ATM90E32 is active.
            https://github.com/coryjfowler/MCP_CAN_lib.git      ; CAN bus library for MCP2515 — required when ENABLE_CAN is active.
            arduino-libraries/Ethernet @ ^2.0.0                 ; W5500 SPI Ethernet — required when ENABLE_ETHERNET is active.

build_flags =
    -DUSE_SOFTWARE_SERIAL
    ;-DENABLE_RGBWLED

    ; EMS PCB revision for include/pins.h (exactly one):
    -DBOARD_VER_V3 ; Latest version of EMS, using NESL EMS PCBA v865B
    ;-DBOARD_VER_V1 ; legacy first version of EMS, handsoldered
    ;-DBOARD_VER_V2 ; legacy first version of EMS, modbus interface pins accidentally swapped 
    ;-DBOARD_HAS_PSRAM       

    ; Feature enable/disable flags (uncomment to enable):
    ;-DENABLE_OLED_DISPLAY       ; OLED SH1106 display   [off — screen parked for now]
    ; Network interface — enable exactly ONE of the two lines below:
    -DENABLE_WIFI               ; WiFi connectivity
    ;-DENABLE_ETHERNET          ; W5500 SPI Ethernet via HR961160C (BOARD_VER_V3 only; mutually exclusive with ENABLE_WIFI)
    -DENABLE_MQTT               ; MQTT client (requires ENABLE_WIFI or ENABLE_ETHERNET)
    ;-DENABLE_CAN               ; CAN bus interface (MCP2515)
    -DENABLE_MODBUS_MASTER      ; Energy meter subsystem (RS485 Modbus OR ATM90E32 SPI)
    -DENABLE_LEAKAGE_MD0630     ; IVY MD0630 Type-B AC+DC leakage CT on RS485_1 (node 100)
    -DLEAKAGE_MOCK              ; Simulate a rising leakage — no module/register map needed (default).
    ;-DLEAKAGE_PROBE            ; Live bring-up: probeRegisters() at addr 1 (FC03/FC04), safe reads only.
    ;                            ; Enable this (and comment MOCK) when the module is on the ESP32 bus.
    ;-DENABLE_MODBUS_CLIENT     ; Modbus client/slave (RS485_2)
    -DENABLE_RELAYS            ; Relay control: onboard SSR + I2C 8-ch SSR bank
    -DENABLE_SD_CARD           ; SD card reader (SPI shared bus, BOARD_VER_V3 only)

    ; SD card logging options (uncomment to enable):
    -DENABLE_SD_SHT20_LOG     ; Log SHT20 temp/humidity to /environmental_log.csv (requires ENABLE_SD_CARD + ENABLE_MODBUS_MASTER)
    -DSD_SHT20_LOG_INTERVAL_MS=60000  ; Log interval in ms (default 60 s)
    
    ; Debugging flags (uncomment to enable):
    ;-DENABLE_SD_CARD_DEBUG    ; Print card type, size, and filesystem usage on boot
    -DENABLE_DEBUG            ; Debug logging
    ;-DUSB_PLOTTER            ; Emit CSV data lines and update per-meter history buffers (Serial Plotter)

    ; ---- Meter type selection (uncomment exactly ONE) ----
    ; If none is set, METER_TYPE_DDS238 is used as the default.
    ;-DMETER_TYPE_DDS238         ; DDS238 single-phase Modbus RTU  (default)
    ;-DMETER_TYPE_CHD130        ; CHINT CHD130 single-phase Modbus RTU
    ;-DMETER_TYPE_DDSU666       ; CHINT DDSU666 single-phase Modbus RTU
    -DMETER_TYPE_ATM90E32      ; CircuitSetup 6-channel ATM90E32 SPI meter
    ;                            ; Requires ATM90E32 library — uncomment in lib_deps above.
    ;                            ; Set CS pins in pins.h (ATM90E32_IC1_CS / ATM90E32_IC2_CS).
    ;                            ; Override board count: -DATM90E32_NUM_BOARDS=2  (default 1)
    ;                            ; Override calibration:  -DATM90E32_VOLTAGE_GAIN=42080
    ;                            ;                        -DATM90E32_CURRENT_GAIN=27961
    ;                            ;                        -DATM90E32_LINE_FREQ=135   (50 Hz)

    ; Enable UARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    ;-DARDUINO_USB_CDC_ON_BOOT=1
    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    -UARDUINO_USB_CDC_ON_BOOT

; Build environment for the ESP32-S3 DevKitC-1 development board.
[env:esp32-s3-devkitc-1]
platform = espressif32 @ ^6.0.0          ; Espressif32 PlatformIO platform (toolchain + SDK for all ESP32 variants)
board = esp32-s3-devkitc-1      ; Target board — sets pin map, flash size, and chip variant
framework = arduino             ; Use Arduino framework (setup/loop) instead of raw ESP-IDF

lib_deps =
    ${common.lib_deps}                          ; Inherit shared libraries from [common]
    esp32async/AsyncTCP @ ^3.4.4                ; Non-blocking TCP layer required by ESPAsyncWebServer
    me-no-dev/ESPAsyncWebServer @ ^3.6.0        ; Async HTTP server (registry release)
    ;https://github.com/me-no-dev/ESPAsyncWebServer.git  ; Alternative: latest GitHub source
    ;https://github.com/me-no-dev/AsyncTCP.git           ; Alternative: latest GitHub source

build_flags = ${common.build_flags}            ; Inherit compiler/preprocessor flags from [common]

board_build.partitions = huge_app.csv  ; Partition table giving ~3 MB to the app (default is ~1.4 MB)
upload_speed = 921600                  ; Fast serial baud rate for flashing firmware over USB
board_build.filesystem = spiffs        ; Use SPIFFS for the flash filesystem (stores HTML, config, certs, etc.)
lib_ldf_mode = deep                    ; Recursively scan all library sources to resolve transitive dependencies
monitor_speed = 115200                 ; Serial monitor baud rate — must match Serial.begin() in firmware
monitor_rts = 0                        ; Don't assert RTS when opening monitor (prevents CH343 forcing the board into download mode)
monitor_dtr = 0                        ; Don't assert DTR when opening monitor (keeps GPIO0 high so the app boots normally)

; ---------------------------------------------------------------------------
; Standalone OLED bring-up test (U8g2). Builds ONLY test_oled/oled_test.cpp,
; ignores the whole main src/ tree. Flash with:
;   pio run -e oled_test -t upload -t monitor
; ---------------------------------------------------------------------------
[env:oled_test]
platform = espressif32 @ ^6.0.0
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = olikraus/U8g2 @ ^2.35.19
build_src_filter = -<*> +<../test_oled/oled_test.cpp>
board_build.partitions = huge_app.csv
upload_speed = 921600
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
